name: Bug report
description: Something in Omni is broken or behaving wrong
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much as you
        can — a clear, reproducible report is the fastest path to a fix.

        **Not a bug — a security vulnerability?** Please don't file it here.
        Follow [SECURITY.md](https://github.com/AlexKapadia/omni/blob/main/SECURITY.md)
        to report it privately.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What went wrong, and what did you expect instead?
      placeholder: When I approved a calendar card, the event was created twice.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: The exact steps that trigger it. A minimal repro is ideal.
      placeholder: |
        1. Start a meeting and let it finalize
        2. Approve the "create event" card
        3. Check Google Calendar — two events
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Which part of Omni?
      options:
        - Capture / audio
        - Transcription (STT)
        - Enhanced notes
        - Ask / retrieval
        - Approval cards / actions
        - Naomi (voice agent)
        - Dictation
        - Router / providers / cost
        - Onboarding / settings
        - Packaging / install / update
        - Other / not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: The Omni release tag, or the commit SHA if you built from source.
      placeholder: v0.1.0 or a6362cb
    validations:
      required: false
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: Windows 11 23H2
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or errors
      description: |
        Paste any error text. **Scrub anything private first** — Omni handles
        private meeting data, so please remove transcripts, names, and never
        include an API key.
      render: shell
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this isn't a duplicate
          required: true
        - label: This is a bug, not a security vulnerability (those go to SECURITY.md)
          required: true
        - label: I've removed any private data or keys from this report
          required: true
