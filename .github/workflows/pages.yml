# Deploys the static marketing landing site (site/) to GitHub Pages.
# The site is plain HTML/CSS/JS with bundled fonts and web-optimized media —
# no build step — so this simply uploads site/ as the Pages artifact.
#
# ONE-TIME ENABLEMENT (repo admin, once): Settings -> Pages -> Build and
# deployment -> Source: "GitHub Actions". After that, every push to main that
# touches site/ publishes automatically.
name: Deploy landing site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch: {}

# Least privilege: only what Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One live deployment at a time; don't cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
