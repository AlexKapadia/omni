# Release: tag v* -> build the engine sidecar (PyInstaller) + the Tauri
# bundle on Windows, macOS, and Linux, then publish a GitHub Release with
# installers and the latest.json auto-updater manifest.
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            engine_binary: omni-engine.exe
            smoke_shell: pwsh
          - os: macos-latest
            engine_binary: omni-engine
            smoke_shell: bash
          - os: ubuntu-latest
            engine_binary: omni-engine
            smoke_shell: bash
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches tauri.conf.json version
        shell: bash
        run: |
          version=$(python -c "import json; print(json.load(open('apps/ui/src-tauri/tauri.conf.json'))['version'])")
          tag="${GITHUB_REF_NAME}"
          if [ "$tag" != "v$version" ]; then
            echo "tag $tag does not match app version v$version"
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync lean engine dependencies
        run: uv sync

      - name: Build engine sidecar (PyInstaller onedir)
        run: uv run --with pyinstaller pyinstaller packaging/omni-engine.spec --noconfirm --distpath packaging/dist --workpath packaging/build

      - name: Smoke-test sidecar boot (GET /health must return 200)
        shell: ${{ matrix.smoke_shell }}
        env:
          OMNI_ENGINE_PORT: "8791"
          OMNI_DB_PATH: ${{ runner.temp }}/omni-smoke/omni.db
          OMNI_MODELS_DIR: ${{ runner.temp }}/omni-smoke/models
        run: |
          mkdir -p "$OMNI_MODELS_DIR"
          if [ "${{ matrix.smoke_shell }}" = "pwsh" ]; then
            $p = Start-Process -FilePath "packaging/dist/omni-engine/${{ matrix.engine_binary }}" -PassThru
            $ok = $false
            foreach ($i in 1..30) {
              Start-Sleep -Seconds 2
              try {
                $r = Invoke-WebRequest -Uri "http://127.0.0.1:8791/health" -UseBasicParsing -TimeoutSec 5
                if ($r.StatusCode -eq 200) { Write-Host "health: $($r.Content)"; $ok = $true; break }
              } catch {}
            }
            Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue
            if (-not $ok) { Write-Error "frozen engine never answered /health"; exit 1 }
          else
            packaging/dist/omni-engine/${{ matrix.engine_binary }} &
            pid=$!
            ok=0
            for i in $(seq 1 30); do
              sleep 2
              if curl -fsS "http://127.0.0.1:8791/health" >/dev/null; then ok=1; break; fi
            done
            kill "$pid" 2>/dev/null || true
            if [ "$ok" -ne 1 ]; then echo "frozen engine never answered /health"; exit 1; fi
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/ui/pnpm-lock.yaml

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/ui/src-tauri

      - name: Install UI dependencies
        working-directory: apps/ui
        run: pnpm install --frozen-lockfile

      - name: Build + publish Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          projectPath: apps/ui
          tagName: ${{ github.ref_name }}
          releaseName: "Omni ${{ github.ref_name }}"
          releaseBody: "Omni ${{ github.ref_name }} — Windows (.exe/.msi), macOS (.dmg/.app), and Linux (.deb/.AppImage). See commit history for changes."
          releaseDraft: true
          prerelease: false
